name: CICD

on: workflow_dispatch

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: code clone
        run: echo "Cloning the code."
  build:
    runs-on: ubuntu-latest
    steps:
      - name: code build
        run: echo "Building the code."
  test:
    runs-on: ubuntu-latest
    steps:
      - name: code test
        run: echo "Testing the code."
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: code deploy
      run: echo "Deploying the code."
